<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Check</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: white;
      color: #333;
      overflow-x: hidden;
    }
    
    html {
      height: auto;
      min-height: fit-content;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    
    .header p {
      margin: 5px 0 0 0;
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
    }
    
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .status-item:last-child {
      margin-bottom: 0;
    }
    
    .status-label {
      font-size: 14px;
      font-weight: 500;
    }
    
    .status-value {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.2);
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      backdrop-filter: blur(10px);
    }
    
    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn-primary {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .btn-primary:hover {
      background: rgba(255, 255, 255, 0.4);
    }
    
    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 Auto Check</h1>
    <p>自动检查扩展程序</p>
  </div>
  
  <div class="status">
    <div class="status-item">
      <span class="status-label">页面状态</span>
      <span class="status-value" id="pageStatus">检测中...</span>
    </div>
    <div class="status-item">
      <span class="status-label">按钮状态</span>
      <span class="status-value" id="buttonStatus">未检测</span>
    </div>
    <div class="status-item">
      <span class="status-label">检查次数</span>
      <span class="status-value" id="checkCount">0</span>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn btn-primary" id="manualCheck">手动执行检查</button>
    <button class="btn" id="refreshStatus">刷新状态</button>
    <button class="btn" id="openOptions">设置选项</button>
  </div>

<!-- 新增：问题类型选择区域 -->
<div class="issue-filters" style="margin: 15px 0; background: rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 15px; backdrop-filter: blur(10px);">
  <h3 style="margin: 0 0 10px 0; font-size: 14px; font-weight: 600;">问题类型筛选</h3>
  <div class="checkbox-group" style="display: flex; flex-direction: column; gap: 8px;">
    <label class="checkbox-label" style="display: flex; align-items: center; cursor: pointer; font-size: 13px; opacity: 0.9;">
      <input type="checkbox" class="issue-checkbox" data-issue="isErrorCode" style="margin-right: 8px; accent-color: #dc3545;">
      <span style="color: #dc3545;">🚨 错误码</span>
    </label>
    <label class="checkbox-label" style="display: flex; align-items: center; cursor: pointer; font-size: 13px; opacity: 0.9;">
      <input type="checkbox" class="issue-checkbox" data-issue="isNoSound" style="margin-right: 8px; accent-color: #ff6b6b;">
      <span style="color: #ff6b6b;">🔇 无声</span>
    </label>
    <label class="checkbox-label" style="display: flex; align-items: center; cursor: pointer; font-size: 13px; opacity: 0.9;">
      <input type="checkbox" class="issue-checkbox" data-issue="isLowLevel" style="margin-right: 8px; accent-color: #ffa726;">
      <span style="color: #ffa726;">🔉 音量小</span>
    </label>
    <label class="checkbox-label" style="display: flex; align-items: center; cursor: pointer; font-size: 13px; opacity: 0.9;">
      <input type="checkbox" class="issue-checkbox" data-issue="isEcho" style="margin-right: 8px; accent-color: #f44336;">
      <span style="color: #f44336;">🔊 回声</span>
    </label>
    <label class="checkbox-label" style="display: flex; align-items: center; cursor: pointer; font-size: 13px; opacity: 0.9;">
      <input type="checkbox" class="issue-checkbox" data-issue="isAudioStutter" style="margin-right: 8px; accent-color: #9c27b0;">
      <span style="color: #9c27b0;">⏸️ 音频卡顿</span>
    </label>
    <label class="checkbox-label" style="display: flex; align-items: center; cursor: pointer; font-size: 13px; opacity: 0.9;">
      <input type="checkbox" class="issue-checkbox" data-issue="isBlack" style="margin-right: 8px; accent-color: #000000;">
      <span style="color: #000000;">🖤 黑屏</span>
    </label>
  </div>
</div>

<!-- 新增：分析结果显示区域 -->
<div class="analysis-results" style="background: rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 15px; backdrop-filter: blur(10px); display: none;">
  <h3 style="margin: 0 0 10px 0; font-size: 14px; font-weight: 600; color: #fff;">分析结果</h3>
  <div id="analysisContent" style="font-size: 12px; line-height: 1.4; color: rgba(255, 255, 255, 0.9);">
    <!-- 动态内容将在这里显示 -->
  </div>
</div>


<div class="settings-panel" id="settingsPanel" style="display: none; background: rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 15px; margin-top: 15px; backdrop-filter: blur(10px);">
  <h3 style="margin: 0 0 10px 0; font-size: 14px; font-weight: 600;">⚙️ 设置</h3>
  <div style="margin-bottom: 15px;">
    <label style="display: block; margin-bottom: 5px; font-size: 12px;">AI 分析服务器 URL</label>
    <input type="text" id="serverUrl" placeholder="https://..." style="width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 12px; box-sizing: border-box; background: rgba(255, 255, 255, 0.9); color: #333;">
  </div>
  <button class="btn btn-primary" id="saveSettings" style="width: 100%;">保存设置</button>
</div>

<div class="footer">
  <p>v1.0 - Auto Check Extension</p>
</div>

<script src="src/issue-rules.js"></script>
<script src="popup.js"></script>
</body>
</html>
